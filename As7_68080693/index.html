<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <title>AS7Wongsakon Kanthiyawong</title>
    <link rel="stylesheet" href="index.css.css">
</head>
<body>
        <video autoplay loop muted>
     <source src="VDO/VDO/242945_small.mp4" type="video/mp4">
    </video>
          <!-- Form Overlay -->
    <div class="form-wrapper">
        <div class="card p-4 shadow form-card">
            <h2 class="text-center mb-4">แบบฟอร์มลงทะเบียน</h2>

            <form action="#" method="post">

                <div class="mb-3">
                    <label class="form-label">ชื่อ-นามสกุล</label>
                    <input type="text" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">อีเมล</label>
                    <input type="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">รหัสผ่าน</label>
                    <input type="password" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">เพศ</label><br>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender">
                        <label class="form-check-label">ชาย</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender">
                        <label class="form-check-label">หญิง</label>
                    </div>
                </div>
                <div class="mb-3">
    <label for="position" class="form-label">ตำแหน่งงาน</label>
    <select class="form-select" id="position" name="position" required>
        <option value="">-- เลือกตำแหน่ง --</option>
        <option value="manager">Manager</option>
        <option value="developer">Developer</option>
        <option value="designer">Designer</option>
        <option value="marketing">Marketing</option>
    </select>
</div>
               <div class="text-center">
                    <button type="submit" class="btn btn-primary me-2">ลงทะเบียน</button>
                    <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                </div>

            </form>
        </div>
    </div>

</div>
<div class="video-controls">
            <button class="btn btn-warning" onclick="document.querySelector('video').play()">
                <i class="bi bi-play-circle"></i> Play
                
            </button>
            <button class="btn btn-danger" onclick="document.querySelector('video').pause()">
                <i class="bi bi-stop-circle"></i> Stop
            </button>
        </div>

</body>
</html>
